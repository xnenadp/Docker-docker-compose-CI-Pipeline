services:
  # 1. Database
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: db
    # Host port 5433 (not 5432) so it does not clash with a locally installed
    # PostgreSQL - lets you inspect the database with pgAdmin or psql
    ports:
      - "5433:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    # Health check: compose knows when the database is REALLY ready, not just started
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 2. API application
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    # Health check: the API is ready only when /users returns a response
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/users"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 3. Test runner
  test:
    build: ./tests
    depends_on:
      app:
        condition: service_healthy

volumes:
  dbdata:
